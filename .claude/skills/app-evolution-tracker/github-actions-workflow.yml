name: App Evolution Tracker
on:
  pull_request:
    types: [closed]
    branches: [dev]  # Change this to your main development branch

jobs:
  update-evolution:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: read
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: dev
        fetch-depth: 0
        
    - name: Setup Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "App Evolution Tracker"
        
    - name: Install GitHub CLI
      run: |
        sudo apt-get update
        sudo apt-get install gh -y
        
    - name: Run Evolution Analysis
      run: |
        # Simple skill invocation - all intelligence is in the skill
        echo "🚀 Running app-evolution-tracker skill for PR #${{ github.event.number }}"
        
        # TODO: Replace this with your method of running Claude skills
        # Options:
        # 1. Claude API: python run_skill.py
        # 2. Claude CLI: claude --skill app-evolution-tracker "analyze PR ${{ github.event.number }}"
        # 3. Webhook: curl to your skill runner service
        # 4. Self-hosted: direct skill execution
        
        echo "📝 This is the generic workflow template."
        echo "🔧 Configure your skill execution method below:"
        echo ""
        echo "Detected PR: #${{ github.event.number }} - ${{ github.event.pull_request.title }}"
        echo "Author: @${{ github.event.pull_request.user.login }}"
        echo "Files changed: Run 'gh pr diff ${{ github.event.number }}' to see changes"
        echo ""
        echo "⚠️ Replace this section with your actual skill execution command"
        echo "The app-evolution-tracker skill contains all the analysis logic."
        
        # For now, create a placeholder to show the workflow structure works
        mkdir -p .app-knowledge/evolution
        echo "# Evolution Analysis Placeholder" > .app-knowledge/evolution/README.md
        echo "" >> .app-knowledge/evolution/README.md
        echo "This file was created by the generic workflow template." >> .app-knowledge/evolution/README.md
        echo "Replace the 'Run Evolution Analysis' step with your skill execution method." >> .app-knowledge/evolution/README.md
        echo "" >> .app-knowledge/evolution/README.md
        echo "**Detected PR:** #${{ github.event.number }} - ${{ github.event.pull_request.title }}" >> .app-knowledge/evolution/README.md
        echo "**Author:** @${{ github.event.pull_request.user.login }}" >> .app-knowledge/evolution/README.md
        echo "**Timestamp:** $(date)" >> .app-knowledge/evolution/README.md
        
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUMBER: ${{ github.event.number }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        
    - name: Commit evolution updates
      run: |
        if [ -n "$(git status --porcelain .app-knowledge/)" ]; then
          git add .app-knowledge/
          git commit -m "docs: evolution analysis from PR #${{ github.event.number }}

        PR: ${{ github.event.pull_request.title }}
        Author: @${{ github.event.pull_request.user.login }}
        
        Generated by app-evolution-tracker skill."
          git push origin dev
          echo "✅ Evolution analysis committed"
        else
          echo "ℹ️ No changes to commit"
        fi

