name: App Evolution Tracker  # ← Not "Fixed YAML"
on:
  pull_request:
    types: [closed]
    branches: [dev]

jobs:
  update-evolution:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: dev
        fetch-depth: 0
        
    - name: Setup Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "App Evolution Tracker"
        
    - name: Run Evolution Analysis  # ← This calls the actual skill
      run: |
        # TODO: Replace with your skill execution method
        python scripts/run-evolution-skill.py ${{ github.event.number }}
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        
    - name: Commit evolution updates
      run: |
        if [ -n "$(git status --porcelain .app-knowledge/)" ]; then
          git add .app-knowledge/
          git commit -m "docs: evolution analysis from PR #${{ github.event.number }}"
          git push origin dev
        fi
