name: App Evolution Tracker
on:
  pull_request:
    types: [closed]
    branches: [dev]  # Change to your branch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  evolution-analysis:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: read
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: dev
        fetch-depth: 0
        
    - name: Setup Git and Tools
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Evolution Tracker"
        sudo apt-get update && sudo apt-get install gh jq -y
        pip3 install anthropic
        echo "✅ Environment ready"
        
    - name: Create Skill Execution Script
      run: |
        cat > execute_skill.py << 'EOF'
        import os
        import anthropic
        import subprocess
        import json
        import sys
        
        def get_pr_data(pr_number):
            """Get PR information using GitHub CLI"""
            try:
                # Get PR details
                pr_result = subprocess.run([
                    'gh', 'pr', 'view', str(pr_number), 
                    '--json', 'title,body,author,files,additions,deletions'
                ], capture_output=True, text=True, check=True)
                
                pr_data = json.loads(pr_result.stdout)
                
                # Get PR diff (truncated for API limits)
                diff_result = subprocess.run([
                    'gh', 'pr', 'diff', str(pr_number)
                ], capture_output=True, text=True, check=True)
                
                return {
                    'number': pr_number,
                    'title': pr_data.get('title', ''),
                    'body': pr_data.get('body', '')[:500],  # Truncate body
                    'author': pr_data.get('author', {}).get('login', ''),
                    'files': [f['path'] for f in pr_data.get('files', [])],
                    'additions': pr_data.get('additions', 0),
                    'deletions': pr_data.get('deletions', 0),
                    'diff': diff_result.stdout[:4000]  # Truncate diff for API
                }
            except Exception as e:
                print(f"Error getting PR data: {e}")
                return None
        
        def load_skill():
            """Load the skill content"""
            skill_content = """
        You are the App Evolution Tracker skill. You analyze merged PRs to maintain comprehensive 
        architectural evolution knowledge in .app-knowledge/evolution/ with smart size management.
        
        Your core capabilities:
        1. **Contextual Analysis**: Analyze PRs in context of accumulated architectural knowledge
        2. **Pattern Recognition**: Learn and recognize team's architectural patterns over time  
        3. **Evolution Intelligence**: Generate insights about architectural evolution and trends
        4. **Smart Size Management**: Keep files focused and under size limits (8KB max)
        5. **Knowledge Accumulation**: Build persistent architectural memory
        
        When analyzing a PR, you:
        1. Load any existing evolution knowledge from .app-knowledge/evolution/
        2. Analyze the PR changes for architectural significance  
        3. Update current architecture state
        4. Record significant changes (MEDIUM/HIGH impact only)
        5. Update architectural patterns and insights
        6. Maintain size limits through intelligent content rotation
        
        File size limits:
        - architecture-overview.md: 5KB (current state only)
        - recent-timeline.md: 8KB (last 20 significant changes)
        - architectural-patterns.md: 6KB (active patterns only)
        - current-insights.md: 5KB (actionable intelligence)
        
        Focus on:
        - Current system state over historical artifacts
        - Proven patterns over speculation
        - Actionable insights over verbose descriptions
        - Quality intelligence over quantity of data
        
        Create/update files under .app-knowledge/evolution/ as needed.
            """
            return skill_content
        
        def execute_skill(pr_number):
            """Execute the skill via Claude API"""
            
            # Check for API key
            api_key = os.environ.get('ANTHROPIC_API_KEY')
            if not api_key:
                print("❌ ANTHROPIC_API_KEY not found")
                print("Add your Claude API key to GitHub Secrets")
                return False
            
            # Get PR data
            print(f"📥 Analyzing PR #{pr_number}...")
            pr_data = get_pr_data(pr_number)
            if not pr_data:
                return False
            
            print(f"📋 PR: {pr_data['title']} by @{pr_data['author']}")
            print(f"📄 Files: {len(pr_data['files'])}, Changes: +{pr_data['additions']}/-{pr_data['deletions']}")
            
            # Load skill
            skill_content = load_skill()
            
            # Create message for skill
            message = f"""
        Analyze this merged PR for comprehensive architectural evolution tracking:
        
        **PR #{pr_data['number']}:** {pr_data['title']}
        **Author:** @{pr_data['author']}
        **Changes:** +{pr_data['additions']}/-{pr_data['deletions']} lines
        **Files Changed:** {len(pr_data['files'])}
        
        **Changed Files:**
        {chr(10).join(f"- {f}" for f in pr_data['files'][:20])}
        {"... and more" if len(pr_data['files']) > 20 else ""}
        
        **PR Description:**
        {pr_data['body'] if pr_data['body'] else 'No description provided'}
        
        **Code Changes Preview:**
        ```diff
        {pr_data['diff'][:3000]}
        {"... [truncated for length]" if len(pr_data['diff']) > 3000 else ""}
        ```
        
        Please analyze this PR and update the evolution knowledge in .app-knowledge/evolution/
        
        Instructions:
        1. Create/update architecture-overview.md with current system state
        2. If architecturally significant (MEDIUM/HIGH), add to recent-timeline.md  
        3. Update architectural-patterns.md with any recognized patterns
        4. Generate current-insights.md with evolution intelligence
        5. Maintain file size limits through smart content management
        6. Focus on current state and actionable insights
        
        Create the .app-knowledge/evolution/ directory structure if it doesn't exist.
            """
            
            # Call Claude API
            print("🧠 Running evolution analysis...")
            try:
                client = anthropic.Anthropic(api_key=api_key)
                
                response = client.messages.create(
                    model="claude-sonnet-4-20250514",
                    max_tokens=4000,
                    system=skill_content,
                    messages=[{"role": "user", "content": message}]
                )
                
                if response.content:
                    result = response.content[0].text
                    print("✅ Evolution analysis completed")
                    print("📄 Analysis result:")
                    
                    # Show preview of response
                    lines = result.split('\n')
                    for i, line in enumerate(lines[:15]):
                        print(f"  {line}")
                    if len(lines) > 15:
                        print(f"  ... ({len(lines) - 15} more lines)")
                    
                    return True
                else:
                    print("⚠️ No response content received")
                    return False
                    
            except Exception as e:
                print(f"❌ Error calling Claude API: {e}")
                return False
        
        if __name__ == "__main__":
            pr_number = os.environ.get('PR_NUMBER', sys.argv[1] if len(sys.argv) > 1 else None)
            if not pr_number:
                print("❌ No PR number provided")
                sys.exit(1)
                
            success = execute_skill(pr_number)
            if not success:
                sys.exit(1)
        EOF
        
        echo "✅ Skill execution script created"
        
    - name: Run Evolution Analysis  
      run: |
        echo "🚀 Executing app-evolution-tracker skill for PR #${{ github.event.number }}"
        python3 execute_skill.py ${{ github.event.number }}
        
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUMBER: ${{ github.event.number }}
        
    - name: Commit Evolution Knowledge
      run: |
        echo "💾 Checking for evolution knowledge updates..."
        
        if [ -n "$(git status --porcelain .app-knowledge/)" ]; then
          git add .app-knowledge/
          git commit -m "knowledge: evolution analysis from PR #${{ github.event.number }}

        🧠 App Evolution Tracker Analysis
        
        PR: ${{ github.event.pull_request.title }}
        Author: @${{ github.event.pull_request.user.login }}
        
        Comprehensive architectural evolution analysis with:
        - Current system state documentation  
        - Architectural pattern recognition
        - Evolution insights and predictions
        - Smart size management (files <8KB)"
          
          git push origin dev
          echo "✅ Evolution knowledge committed and pushed"
        else
          echo "ℹ️ No evolution knowledge changes to commit"
        fi
        
    - name: Analysis Summary
      run: |
        echo ""
        echo "🎯 App Evolution Analysis Complete!"
        echo ""
        echo "📊 PR Analysis:"
        echo "   - PR: #${{ github.event.number }} - ${{ github.event.pull_request.title }}"
        echo "   - Author: @${{ github.event.pull_request.user.login }}"
        echo ""
        echo "🧠 Evolution Intelligence:"
        echo "   - Skill executed via Claude API"
        echo "   - Architectural patterns analyzed"
        echo "   - Evolution knowledge updated"
        echo ""
        echo "📁 Knowledge Location: .app-knowledge/evolution/"
        echo "   - Smart size management enabled"
        echo "   - Files kept under 8KB each"
        echo "   - Comprehensive intelligence maintained"
        echo ""
        echo "🎉 Repository evolution intelligence enhanced!"
