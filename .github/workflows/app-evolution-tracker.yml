name: App Evolution Tracker (Fixed YAML)
on:
  pull_request:
    types: [closed]
    branches: [dev]

jobs:
  update-evolution:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: read
    
    steps:
    - name: Checkout with proper auth
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: dev
        
    - name: Setup Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "App Evolution Tracker"
        echo "✅ Git configured with proper authentication"
        
    - name: Create evolution documentation
      run: |
        echo "📝 Creating evolution documentation..."
        
        # Create directory
        mkdir -p .app-knowledge/evolution
        
        # Get current date
        CURRENT_DATE=$(date '+%Y-%m-%d')
        CURRENT_DATETIME=$(date '+%Y-%m-%d %H:%M:%S UTC')
        
        # Create architecture file
        cat > .app-knowledge/evolution/architecture-current.md << EOF
        # Current Architecture - Updated ${CURRENT_DATE}
        
        ## Recent Update
        **PR #${{ github.event.number }}:** ${{ github.event.pull_request.title }}
        **Author:** @${{ github.event.pull_request.user.login }}
        **Updated:** ${CURRENT_DATETIME}
        
        ## System Overview  
        This documentation is automatically maintained by the App Evolution Tracker.
        Each PR merge to dev branch updates this living documentation.
        
        ## Recent Evolution
        - **Latest Change:** PR #${{ github.event.number }} merged to dev branch
        - **Automation Status:** ✅ Successfully running via GitHub Actions
        - **Last Update:** ${CURRENT_DATETIME}
        
        ## Architecture Notes
        *This is the minimal version of the evolution tracker.*
        *The full version will analyze code changes and provide detailed architectural insights.*
        
        ### Current Services
        - Documentation system: ✅ Active (GitHub Actions)
        - Evolution tracking: ✅ Active (automated)
        - Knowledge management: ✅ Basic (file-based)
        
        ### Technology Stack  
        - Repository: GitHub
        - Automation: GitHub Actions  
        - Documentation: Markdown
        - Version Control: Git
        
        ## Success Metrics
        - ✅ Files created automatically on PR merge
        - ✅ Commits pushed successfully to dev branch
        - ✅ Living documentation maintained without manual effort
        
        ## Next Steps
        1. ✅ Basic automation working
        2. 🔧 Configure Claude API key for detailed analysis (optional)
        3. 🚀 Enable full PR diff analysis  
        4. 📈 Expand to cover technical insights and deprecations
        EOF
        
        # Create or update major changes file
        if [ ! -f .app-knowledge/evolution/major-changes.md ]; then
          cat > .app-knowledge/evolution/major-changes.md << EOF
        # Major Evolution Events
        
        ## ${CURRENT_DATE} - Evolution Tracking Enabled
        **PR:** #${{ github.event.number }} by @${{ github.event.pull_request.user.login }}
        **Impact:** Added automated evolution tracking to dev branch
        **Why:** Maintain living documentation of application changes and insights
        **Current State:** ✅ Basic evolution tracking active and working
        
        ## Authentication Fix Applied
        **Date:** ${CURRENT_DATE}
        **Issue:** Git push authentication resolved
        **Solution:** Proper GitHub token configuration with actions/checkout
        **Result:** Files now successfully committed and pushed to dev branch
        EOF
        else
          # Update existing file with latest PR info
          echo "" >> .app-knowledge/evolution/major-changes.md
          echo "## ${CURRENT_DATE} - PR #${{ github.event.number }}" >> .app-knowledge/evolution/major-changes.md
          echo "**Title:** ${{ github.event.pull_request.title }}" >> .app-knowledge/evolution/major-changes.md  
          echo "**Author:** @${{ github.event.pull_request.user.login }}" >> .app-knowledge/evolution/major-changes.md
          echo "**Status:** ✅ Evolution documentation updated automatically" >> .app-knowledge/evolution/major-changes.md
        fi
        
        echo "✅ Evolution documentation created/updated"
        
    - name: Show what was created
      run: |
        echo "📋 Files created/updated:"
        ls -la .app-knowledge/evolution/
        echo ""
        echo "📄 Architecture file preview:"
        head -15 .app-knowledge/evolution/architecture-current.md
        
    - name: Commit and push
      run: |
        echo "📤 Committing changes..."
        
        if [ -n "$(git status --porcelain .app-knowledge/)" ]; then
          git add .app-knowledge/
          git commit -m "docs: update app evolution knowledge from PR #${{ github.event.number }}

        Automated update from app-evolution-tracker.

        PR: ${{ github.event.pull_request.title }}
        Author: @${{ github.event.pull_request.user.login }}
        Run: ${{ github.run_id }}

        ✅ YAML syntax fixed - workflow should complete successfully!"
          
          git push origin dev
          echo "✅ Changes committed and pushed to dev branch"
        else
          echo "ℹ️ No changes to commit"
        fi
        
    - name: Success summary
      run: |
        echo ""
        echo "🎉 App Evolution Tracker completed successfully!"
        echo "📁 Check .app-knowledge/evolution/ directory in dev branch"
        echo "📝 Files are automatically updated on each PR merge"
        echo "🔧 Add ANTHROPIC_API_KEY secret for Claude-powered analysis (optional)"
        echo ""
        echo "✅ YAML syntax issue resolved!"
