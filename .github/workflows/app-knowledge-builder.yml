name: App Knowledge Builder

on:
  pull_request:
    types: [closed]
    branches: [dev]
  workflow_dispatch:  # allows manual re-run if you ever delete .app-knowledge/

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-knowledge:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 90  # generous, mostly for bootstrap

    permissions:
      contents: write
      pull-requests: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "App Knowledge Builder"

      - name: Verify skill is present
        run: |
          if [ ! -f .claude/skills/app-knowledge-builder/SKILL.md ]; then
            echo "::error::Skill not found at .claude/skills/app-knowledge-builder/SKILL.md"
            exit 1
          fi
          echo "✅ Skill found"

      - name: Detect bootstrap vs incremental mode
        id: mode
        run: |
          if [ -f .app-knowledge/INDEX.md ]; then
            echo "mode=incremental" >> $GITHUB_OUTPUT
            echo "max_turns=150"     >> $GITHUB_OUTPUT
            echo "🔄 Incremental mode (.app-knowledge/INDEX.md found)"
          else
            echo "mode=bootstrap"    >> $GITHUB_OUTPUT
            echo "max_turns=500"     >> $GITHUB_OUTPUT
            echo "🌱 Bootstrap mode (.app-knowledge/INDEX.md missing)"
          fi

      - name: Update .app-knowledge via Claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Mode: ${{ steps.mode.outputs.mode }}

            Use the `app-knowledge-builder` skill at
            `.claude/skills/app-knowledge-builder/SKILL.md` to manage the
            `.app-knowledge/` folder. Follow the skill's own instructions for
            bootstrap vs incremental, anti-historical discipline, gap logging,
            and split-on-overflow.

            ${{ steps.mode.outputs.mode == 'bootstrap' && '🌱 BOOTSTRAP RUN — `.app-knowledge/` does not exist yet. Build it from the full PR history of this repo. If you run out of budget, ensure INDEX.md and a cursor are written so the next run can resume incrementally. Use `gh` CLI for PR data (GH_TOKEN is set).' || '' }}

            ${{ steps.mode.outputs.mode == 'incremental' && format('🔄 INCREMENTAL RUN — process ONLY PR #{0} ("{1}") by @{2}, merge SHA {3}. Do not re-scan prior history. Update only the affected files under `.app-knowledge/` and advance the cursor.', github.event.pull_request.number, github.event.pull_request.title, github.event.pull_request.user.login, github.event.pull_request.merge_commit_sha) || '' }}

            Rules:
            - If you cannot determine what changed within reasonable effort,
              write a short note to `.app-knowledge/gaps.md` and move on.
              Do not loop on the same investigation.
            - Do not run `git commit` or `git push` — a later step handles that.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns ${{ steps.mode.outputs.max_turns }}
            --allowed-tools "Read,Write,Edit,Bash"

      - name: Show what Claude produced
        run: |
          echo "=== Mode: ${{ steps.mode.outputs.mode }} ==="
          echo "=== git status ==="
          git status --short
          echo ""
          echo "=== .app-knowledge/ ==="
          ls -la .app-knowledge/ 2>/dev/null || echo "(folder missing)"

      - name: Commit and push
        run: |
          if [ -z "$(git status --porcelain .app-knowledge/)" ]; then
            echo "ℹ️ No .app-knowledge changes to commit"
            exit 0
          fi
          git add .app-knowledge/
          if [ "${{ steps.mode.outputs.mode }}" = "bootstrap" ]; then
            git commit -m "docs(app-knowledge): initial bootstrap"
          else
            git commit -m "docs(app-knowledge): update from PR #${{ github.event.pull_request.number }}"
          fi
          git push origin dev
          echo "✅ Pushed to dev"