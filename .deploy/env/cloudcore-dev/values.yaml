ingress:
  default:
    hosts:
      "dotnet-template-qa.optimove.net": /*

gcp_access:
  project_id: cloudcore-dev

hpa:
  enabled: "true"
  minReplicas: 1
  maxReplicas: 2
  cpu:
    targetCPUUtilizationPercentage: 70
  memory:
    targetMemoryUtilizationPercentage: 70

resources:
  requests:
    memory: '512Mi'
    cpu: '200m'
  limits:
    memory: '1Gi'
    cpu: '1'